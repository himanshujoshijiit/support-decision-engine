# Getting Started — Run the Suite

**Repo:** clone from [github.com/himanshujoshijiit/support-decision-engine](https://github.com/himanshujoshijiit/support-decision-engine)

Four products, four ports. **Support** = Java + Python. **Churn, Knowledge, Cost** = Python only.

> **Prerequisite:** Python 3.10+ and (for Support) Java 17 + Maven. No API keys — all mock data.

---

## Step 0 — One-time setup

```powershell
# Python (if missing)
winget install Python.Python.3.12
# Close and reopen PowerShell, then:
python --version

# Java + Maven (Support dashboard only)
mvn -version
```

If `Activate.ps1` is blocked:
```powershell
Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
```

**Port conflict?** If 8080 is taken, run Java on another port:
```powershell
mvn spring-boot:run "-Dspring-boot.run.arguments=--server.port=8090"
```
Then set `$env:AUDIT_BASE_URL="http://localhost:8090"` before starting the Python engine.

# Support Decision Engine — Founder Playbook

> The product is not the hard part. **Getting the first 3 paying customers is.**

This repo is the technical MVP. This doc is the go-to-market that goes with it.

> **Companion docs:** [Architecture & pipelines](ARCHITECTURE.md) ·
> [Outreach templates](OUTREACH.md) · [Demo script](DEMO_SCRIPT.md) ·
> [Security one-pager](SECURITY.md) · [Pilot agreement](PILOT_AGREEMENT.md) ·
> [Integration checklist](INTEGRATION_CHECKLIST.md)

---

## The one architectural principle (locked in)

```
Hard rules (policy)  ->  Soft reasoning (LLM)  ->  Human decision  ->  Audit
```

**Never let the LLM invent an action outside what policy allows.** This is now enforced
in code by the Decision Orchestrator (`python-service/app/orchestrator.py`): the policy
engine emits `allowed_actions`, and any out-of-policy model recommendation is clamped and
logged (`policy_clamped`). Refund amounts are capped to the policy ceiling. That is the
trust story and the legal cover — not a prompt instruction, an enforced boundary.

---

## Gaps closed before build

| Gap | Fix |
|-----|-----|
| ICP too broad | Wedge: subscription SaaS, **$50–500 ARPU, refund-heavy** (devtools, education, fitness) |
| No success metrics | Defined below: time-to-action, override rate, refund $ saved, audit coverage |
| Security/compliance | [SECURITY.md](SECURITY.md): read-only scopes, retention, SOC2 timeline |
| Failure modes | Policy runs first; LLM reasons **only within allowed actions** (enforced) |
| Integration reality | **One helpdesk for MVP — Zendesk.** See [INTEGRATION_CHECKLIST.md](INTEGRATION_CHECKLIST.md) |
| Human workflow | Sidebar/queue console, not a separate product |
| Policy ownership | "We encode your playbook in week 1" = the onboarding fee |

---

## What you're building

A **judgment layer** between an incoming support ticket and the human/action that
resolves it. It reads context, applies policy, and either acts or tells the agent exactly
what to do and why.

**One-liner:** *"Your support team will never give a wrong refund, miss an SLA, or make
an inconsistent call again."*

Not a chatbot. Not another helpdesk. A decision + audit system.

---

## How the repo maps to the 6-week plan

| Week | Plan | Where it lives |
|---|---|---|
| 1–2 | Data in (webhook + context) | `python-service/app/webhooks.py`, `app/context/` |
| 3 | Policy engine (core IP) | `python-service/app/policy/`, `config/policies.json` |
| 4 | LLM reasoning layer | `python-service/app/llm/` |
| 5 | Agent UI + audit log | `java-service/.../static/index.html`, `java-service/.../model/Decision.java` |
| 6 | Feedback loop | override capture in `DecisionService` + `/api/stats` |

**Not in MVP:** mobile app, complex settings UI, multi-language, self-serve signup.
Integrations are mocked behind interfaces so it runs with zero accounts.

---

## The 15-minute demo

1. **(1–3) The pain.** Ask: *"How do your agents decide whether to give a refund?"* The
   answer will be vague. *"That's exactly the problem."*
2. **(3–10) The demo.** Run `python scripts/simulate_ticket.py`. Walk the dashboard:
   ticket in -> customer history pulled -> policy flags it -> plain-English recommendation
   with a confidence score -> agent clicks approve -> done in 20s, logged forever. Then show
   an **override** and how the reason is captured.
3. **(10–13) The ROI.** *"How many tickets/day? How many are judgment calls? What's the
   cost of one wrong refund or one missed SLA?"* Let the numbers sell.
4. **(13–15) The ask.** *"We're working with 3 pilot companies at a reduced rate. Let me
   set this up on your actual tickets for 2 weeks, no commitment. Want to try?"*

---

## First 3 customers

1. **Warm network** — one founder/ops head you know. Free for 30 days for honest feedback
   + a testimonial. Social proof unlocks customers 2 and 3.
2. **Targeted cold outreach** — SaaS, 50–200 employees, has a support team, uses
   Intercom/Zendesk. Message the Head of Support or COO.
3. **Referral** — after feedback, ask *"Who else do you know running a support team that
   would find this useful?"* One warm referral beats 100 cold emails.

See [OUTREACH.md](OUTREACH.md) for word-for-word templates.

The feedback loop. Every override + reason (captured in the Java audit store and surfaced

<script type="text/markdown" id="md-architecture">
# Technical Architecture

The whole product rests on one principle:

```
Hard rules (policy)  ->  Soft reasoning (LLM)  ->  Human decision  ->  Audit
```

**Never let the LLM invent an action outside what policy allows.** That is the trust
story and the legal cover. In this codebase that boundary is enforced in code by the
**Decision Orchestrator** (`python-service/app/orchestrator.py`), not just by a prompt.

---

## 1. System diagram

```mermaid
flowchart TB
    subgraph Sources
        HD[Helpdesk<br/>Zendesk / Intercom]
        BILL[Billing<br/>Stripe / Chargebee]
        CRM[Optional: CRM / Product DB]
    end

    subgraph PythonService["Python service - AI judgment layer"]
        WH[Webhook Receiver<br/>FastAPI]
        NORM[Event Normalizer<br/>canonical Ticket schema]
        CTX[Context Aggregator<br/>mock / Stripe provider]
        POL[Policy Engine<br/>JSON rules + allowed_actions]
        LLM[LLM Reasoning Layer<br/>structured JSON output]
        ORCH[Decision Orchestrator<br/>policy CAPS the LLM action]
    end

    subgraph JavaService["Java service - audit + decision store"]
        API[REST API]
        STORE[(Decisions + audit trail<br/>H2 dev / Postgres pilot)]
        UI[Agent Console / Sidebar]
    end

    HD -->|ticket.created / updated| WH
    WH --> NORM
    NORM --> CTX
    BILL --> CTX
    CRM --> CTX
    CTX --> POL
    POL -->|allowed_actions, max_refund| ORCH
    CTX --> LLM
    POL -->|constraints| LLM
    LLM -->|proposed action| ORCH
    ORCH -->|POST /api/decisions| API
    API --> STORE
    API --> UI
    UI -->|approve / override / escalate| API
    API --> STORE
    API -.->|optional write-back| HD
```

Why the split? Python is where the AI "wow moment" and the LLM ecosystem live. Java is
the durable, traceable system of record that ops and finance buyers trust — a full
record of *what was recommended, what the human did, and why*.

---

## 2. Request flow (single ticket)

```mermaid
sequenceDiagram
    participant Z as Zendesk / Intercom
    participant W as Webhook (FastAPI)
    participant C as Context Provider
    participant P as Policy Engine
    participant L as LLM Reasoner
    participant O as Orchestrator
    participant A as Audit Store (Java)
    participant U as Agent Console

    Z->>W: ticket.created webhook
    W->>W: normalize -> Ticket
    W->>C: fetch customer + billing context
    C-->>W: CustomerContext snapshot
    W->>P: build_facts(ticket, context) -> evaluate
    P-->>O: decisive_action, allowed_actions[], max_refund_usd, flags
    W->>L: ticket + context + policy (incl. allowed_actions)
    L-->>O: proposed action, amount, confidence, reason
    O->>O: ENFORCE - clamp action to allowed_actions; cap refund
    O->>A: POST /api/decisions (pending)
    A-->>O: stored decision id
    O-->>W: Decision (returned to caller)
    U->>A: agent approves / overrides / escalates (+reason)
    A->>A: append immutable audit action
    A-.->>Z: optional tag / internal note
```

---

## 3. The pipeline, stage by stage

| # | Stage | Code | What it does |
|---|-------|------|--------------|
| 1 | **Intake / normalize** | `app/webhooks.py`, `app/main.py` | Turn a Zendesk/Intercom payload into a canonical `Ticket` (detects category, refund intent, amount). |
| 2 | **Context** | `app/context/` | Fetch customer LTV, tenure, refund history, fraud risk, subscription. Mock provider by default; Stripe provider skeleton included. |
| 3 | **Policy engine** | `app/policy/engine.py`, `config/policies.json` | Deterministic JSON rules run **first**. Emits `decisive_action`, **`allowed_actions[]`**, `max_refund_usd`, and `flags`. This is the IP an ops team owns and tunes. |
| 4 | **LLM reasoning** | `app/llm/` | Explains the call in plain English and proposes an action **from `allowed_actions`**. Falls back to a deterministic heuristic with no API key. |
| 5 | **Orchestrator** | `app/orchestrator.py` | The trust gate. If the model proposes a disallowed action it is **clamped** to the policy's decisive/safe action and flagged `policy_clamped`. Refund amounts are **capped** to `max_refund_usd`. |
| 6 | **Audit + human action** | `java-service/` | Persists every decision + the agent's action (approve / override / escalate) and the override reason — the feedback loop. |

### The trust boundary in detail

The policy engine never returns just one action — it returns the **set** of actions the
LLM is allowed to recommend:

- Each rule's `then.allow` list declares what that rule permits (e.g. the fraud rule
  allows only `DENY_REFUND` and `ESCALATE` — **never** `APPROVE_REFUND`).
- The always-safe actions `RESPOND`, `ASK_CLARIFICATION`, `ESCALATE` are unioned in, so a
  human is never boxed into a single option and can always ask or escalate.
- The orchestrator compares the model's proposal against this set. Outside the set =>
  clamp + `policy_clamped = true` + `auto_executed = false` + confidence reduced. The
  original model rationale is preserved in the reason for the audit trail.

This means **a hallucinating or jailbroken model cannot issue a refund the policy
forbids.** That is the difference between a demo and something finance will sign off on.

---

## 4. Canonical data model

The `Decision` payload the Python engine produces and ships to the audit store:

```json
{
  "ticket_id": "T-1001",
  "customer_id": "cus_loyal_whale",
  "recommended_action": "APPROVE_REFUND",
  "amount_usd": 49,
  "confidence": 0.92,
  "reason": "8-month customer, $2,400 LTV, first refund, duplicate charge confirmed - low risk, aligns with policy.",
  "clarifying_question": null,
  "policy_matches": ["auto_approve_high_ltv_billing"],
  "allowed_actions": ["APPROVE_REFUND", "ASK_CLARIFICATION", "ESCALATE"],
  "flags": ["trusted", "auto_approved"],
  "source": "heuristic",
  "auto_executed": true,
  "policy_clamped": false,
  "context_snapshot": { "ltv_usd": 2400, "tenure_months": 8, "refunds_given_count": 0, "fraud_risk": "low" },
  "created_at": "2026-06-15T10:12:00Z"
}
```

After the agent acts, the Java store appends an immutable `AgentAction`
(`action_taken`, `final_action`, `agent_id`, `override_reason`, `created_at`).

---

## 5. Policy config (the part ops owns)

Rules live in `python-service/config/policies.json`, are sorted by `priority` (highest
wins), and are hot-reloadable via `POST /admin/reload-policies` — no redeploy.

```json
{
  "id": "deny_high_fraud_refund",
  "description": "High fraud risk + refund request: deny by default and route to fraud review.",
  "priority": 850,
  "when": {
    "all": [
      { "fact": "ticket.refund_requested", "op": "eq", "value": true },
      { "fact": "customer.fraud_risk", "op": "eq", "value": "high" }
    ]
  },
  "then": {
    "action": "DENY_REFUND",
    "allow": ["DENY_REFUND", "ESCALATE"],
    "flags": ["fraud_risk"],
    "auto_execute": false
  }
}
```

`when` supports nested `all` / `any` / `not` groups and leaf conditions
`{fact, op, value}`. Ops: `eq, ne, gt, gte, lt, lte, in, not_in, contains`.
`then.allow` is the action whitelist; `then.max_refund_usd` sets the refund ceiling.

---

## 6. LLM prompt skeleton (orchestrator-owned)

```text
You are the reasoning core of a Support Decision Engine.

- You may ONLY choose a recommended_action from the allowed_actions provided.
  Anything outside that list is discarded by the orchestrator.
- Prefer the policy's decisive_action unless the ticket text reveals something the
  rules could not see (and your alternative is still allowed).
- Never invent customer facts. Cite the numbers that drove the call.
- If you lack information, use ASK_CLARIFICATION (when allowed).

Output JSON only:
{
  "recommended_action": "<one of allowed_actions>",
  "amount_usd": <number or null, only for APPROVE_REFUND>,
  "confidence": <0.0-1.0>,
  "reason": "<2-3 sentences for the agent>",
  "clarifying_question": "<if action is ASK_CLARIFICATION, else null>"
}
```

---

## 7. Stack

| Layer | This MVP | Pilot / scale path |
|-------|----------|--------------------|
| Webhook + API | **Python (FastAPI)** | same |
| Reasoning | Heuristic (offline) -> **OpenAI / Anthropic** via env | tool-use / JSON schema |
| Policy | **JSON rules engine** (custom, explainable) | per-customer rule files + editor |
| Audit / store | **Java (Spring Boot)** + H2 | **Postgres** (swap `spring.datasource.*`) |
| Agent UI | **Vanilla JS console** (`static/index.html`) | React sidebar inside the helpdesk |
| Queue | direct call | **Redis / BullMQ / SQS** to decouple slow Stripe/LLM calls |
| Auth | none (MVP) | **Clerk / Auth0** |
| Hosting | local / single region | Railway / Render / Fly -> K8s |

> What's intentionally **not** in the MVP: mobile app, complex settings UI,
> multi-language, self-serve signup. Integrations are mocked behind clean interfaces so
> the system runs end-to-end with zero external accounts.

See [INTEGRATION_CHECKLIST.md](INTEGRATION_CHECKLIST.md) to wire real Zendesk + Stripe,
and [SECURITY.md](SECURITY.md) for the data-flow / compliance one-pager.
</script>

*[Click the "Double charged" ticket.]*

### [6:00–9:00] LLM recommendation

*[Show: Action APPROVE REFUND ($49), confidence, reason block.]*

> "Recommendation: approve refund of $49. Reason: eight-month customer, $2,400 LTV, first
> refund request, duplicate charge confirmed — low fraud risk, aligns with policy."

> "The model doesn't invent policy. It explains the call inside the boundaries your rules
> allow. If it ever tried to step outside them, the system overrides it and logs that it
> tried — that's the compliance story."

### [9:00–11:00] Agent action + audit

*[Click Approve.]*

> "Agent clicks approve — done. The helpdesk updates; the refund triggers or queues per

> escalation? … And how long does an agent spend researching the account and billing
> before deciding? … What's the fully loaded cost per agent hour?"

*[Pause. Let them multiply.]*

> "Even at 50 judgment tickets a day and five minutes saved each, that's four-plus hours

### [13:00–15:00] Close

> "We're running three pilots at reduced setup — plug into your Zendesk and Stripe, encode

> "If it's useful, we move to Starter at $499/month; setup is a one-time onboarding fee
> because we're encoding your policies with you."

> "Want to pick a pilot kickoff date, or should I send the security one-pager and sandbox

## Objection handlers (keep in pocket)

| They say | You say |
|----------|---------|
| "We already use AI in Zendesk" | "That's usually deflection or macros. We're focused on **judgment calls** — refund, deny, escalate — with audit and a hard policy boundary." |
| "Agents won't trust AI" | "They don't have to. Policy runs first; the AI can only suggest actions policy allows; agents override with one click and a reason." |
| "Security?" | "Read-only APIs, no training on your data without opt-in, configurable retention, audit export for compliance. One-pager attached." |

1. High-LTV billing refund -> **AUTO-APPROVE** (capped at policy ceiling)
2. Repeat refunder within 90 days -> **ESCALATE for review**
3. Angry high-value customer -> **PRIORITY_ROUTE**
4. SLA breach -> **ESCALATE immediately**

<script type="text/markdown" id="md-security">
# Security & Data-Flow One-Pager

A page you can send to ops/finance before a pilot. Keep it honest — if you're
pre-compliance, say so with a timeline.

---

## What data we touch

| Source | Scope | Examples |
|--------|-------|----------|
| Helpdesk (Zendesk) | **Read-only** ticket + requester | subject, body, requester id, tags, priority |
| Billing (Stripe) | **Read-only** customer + charges | LTV, subscription status, recent charges, refund history |
| Optional write-back | Ticket tag / internal note only | "auto-approved by SDE", decision id |

We do **not** request payment-method, card, or PII beyond what's needed to decide a
ticket. No write access to issue refunds unless a customer explicitly enables it.

---

## How a decision flows

```
ticket -> normalize -> fetch context (read-only) -> policy rules -> LLM reason
   -> orchestrator (policy caps the action) -> store decision -> agent acts -> audit log
```

The LLM only ever sees the **context snapshot** for the ticket being decided, and can
only recommend an action the policy engine already permitted.

---

## Controls

- **Read-only scopes** — Zendesk ticket read, Stripe customer/charges read.
- **No model training on your data** without written opt-in.
- **Policy-before-LLM** — deterministic rules run first; the AI cannot choose an action
  outside the allowed set, and refund amounts are capped in code. Out-of-policy attempts
  are logged (`policy_clamped`).
- **Immutable audit trail** — every decision + human action is appended, attributed by
  agent id, with timestamps; exportable for finance review.
- **Encryption** — TLS in transit; encryption at rest (Postgres) for pilots.
- **Data retention** — 90 days default, configurable delete.
- **Tenant isolation** — one policy file + datastore per customer.

---

## Compliance posture (be honest)

- **SOC 2:** roadmap — Type I targeted [Qx], Type II [Qx+2]. Pre-compliance today.
- **GDPR/data deletion:** retention is configurable; deletion on request is supported.
- **Subprocessors:** LLM provider (OpenAI/Anthropic) only when enabled; otherwise the
  engine runs fully offline on the deterministic heuristic.

---

## Pilot defaults

- Run on a **sandbox or a single tagged queue** first.
- Read-only by default — no refunds executed automatically during the pilot.
- All recommendations reviewed by a human; we measure agreement vs. override rate.
</script>

<script type="text/markdown" id="md-integration">
# Zendesk + Stripe Integration Checklist

For MVP we pick **one** helpdesk (Zendesk — usually easiest for B2B SaaS) and **one**
billing source (Stripe). Both are mocked behind clean interfaces, so you flip from mock
to real by setting env vars and dropping in credentials — no code changes to the pipeline.

---

## 0. Local first (no accounts)

The engine runs fully offline with the mock context provider and heuristic reasoner:

```bash
# Java audit store
cd java-service && mvn spring-boot:run        # http://localhost:8080/

# Python engine
cd python-service && uvicorn app.main:app --reload --port 8000
python scripts/simulate_ticket.py             # fire the demo set
```

Confirm decisions appear in the dashboard before wiring anything real.

---

## 1. Zendesk (read-only)

**API scopes / auth**
- [ ] Create an API token (Admin Center -> Apps and integrations -> APIs -> Zendesk API).
- [ ] Use a dedicated read-only agent/service account.
- [ ] Required read: **Tickets read**, **Users read** (requester context).
- [ ] (Optional write-back) **Tickets write** only if you want tags / internal notes.

**Webhook**
- [ ] Create a webhook -> target URL `https://<your-host>/webhooks/zendesk`.
- [ ] Trigger on `ticket.created` (and optionally `ticket.updated`).
- [ ] Add a signing secret; verify the signature at the receiver (TODO before prod).
- [ ] Payload: ensure subject/description/requester are included.

**Test tickets**
- [ ] Create a sandbox or use a **tagged queue** (e.g. tag `sde-pilot`).
- [ ] Fire: a billing/refund ticket, a no-response/SLA ticket, an angry message.
- [ ] Confirm each becomes a `Decision` in the dashboard with the expected action.

> The normalizer (`app/webhooks.py::from_zendesk`) already tolerates flattened or nested
> payloads and auto-detects category + refund intent + amount.

---

## 2. Stripe (read-only)

**API key / scopes**
- [ ] Create a **restricted key** (Developers -> API keys -> Restricted).
- [ ] Grant **read** on: Customers, Charges, Subscriptions, Refunds, Disputes.
- [ ] Grant **no write** permissions.
- [ ] Store as `STRIPE_API_KEY`; never commit it.

**Wire it up**
- [ ] Set in `python-service/.env`:

```
CONTEXT_PROVIDER=stripe
STRIPE_API_KEY=rk_live_or_test_xxx
```

- [ ] Map your Zendesk requester -> Stripe customer (email match or external id).
- [ ] Implement the field mapping in `app/context/stripe_provider.py`
      (LTV, tenure, refunds_last_90d, subscription_status, fraud_risk).

**Test**
- [ ] Use Stripe **test mode** customers with known LTV / refund history.
- [ ] Confirm the `context_snapshot` on a decision reflects real Stripe data.

---

## 3. LLM provider (optional — heuristic works without it)

- [ ] Set in `.env`:

```
LLM_PROVIDER=openai        # or anthropic
OPENAI_API_KEY=sk-xxx      # or ANTHROPIC_API_KEY
LLM_MODEL=gpt-4o-mini
```

- [ ] Confirm `GET /health` shows `"llm_live": true`.
- [ ] Run the demo set and confirm reasons are model-generated, actions still respect
      `allowed_actions` (the orchestrator clamps anything out of policy).

---

## 4. Audit store -> Postgres (for the pilot)

H2 (in-memory) is the default. For a pilot, point Spring at Postgres in
`java-service/src/main/resources/application.properties`:

```properties
spring.datasource.url=jdbc:postgresql://localhost:5432/sde
spring.datasource.username=sde
spring.datasource.password=...
spring.jpa.hibernate.ddl-auto=update
```

- [ ] Confirm decisions persist across restarts.
- [ ] Set `AUDIT_BASE_URL` in the Python `.env` if the Java service isn't on localhost:8080.

---

## 5. Policies (week-1 onboarding work)

- [ ] Encode the customer's refund/SLA/escalation rules in `config/policies.json`.
- [ ] Set `then.allow` per rule (the action whitelist) and `max_refund_usd` ceilings.
- [ ] Hot-reload with `POST /admin/reload-policies` — no redeploy.
- [ ] Walk the ops owner through each rule and the `allowed_actions` it produces.

---

## 6. Go-live gate

- [ ] Read-only verified end to end (no accidental writes).
- [ ] Webhook signature verification enabled.
- [ ] Secrets in a vault / env, not in git.
- [ ] Audit export tested (hand it to the finance contact).
- [ ] Success metrics dashboard (`GET /api/stats`) reviewed with the ops lead.
</script>

<script type="text/markdown" id="md-support-product">
# Product 1 — Support Decision Engine

**Judgment layer for support tickets** — not a chatbot. Policy runs first, LLM explains, human decides, everything is audited.

| | |
|---|---|
| **Ports** | 8080 (Java dashboard) + 8000 (Python engine) |
| **Folder** | `java-service/` + `projects/support-decision-engine/python-service/` |
| **ACV target** | $500–1,500/mo |
| **Buyer** | Head of Support, COO |

---

## Features

- **Webhook intake** — Zendesk + Intercom payloads normalized to a canonical `Ticket`
- **Customer context** — LTV, tenure, refund history, fraud risk, subscription (mock or Stripe)
- **Policy engine** — JSON rules in `config/policies.json`; emits `allowed_actions` + refund ceiling
- **LLM reasoning** — plain-English recommendation (heuristic offline, OpenAI/Anthropic optional)
- **Decision orchestrator** — hard-clamps any out-of-policy model action (`policy_clamped`)
- **Agent dashboard** — queue, confidence, policy chips, approve/override/escalate
- **Audit trail** — immutable log of recommendation + human action + override reason
- **Feedback loop** — `/api/stats` override rate feeds policy tuning

---

## Architecture

```mermaid
flowchart LR
    subgraph Sources
        Z[Zendesk / Intercom]
        S[Stripe billing]
    end
    subgraph Python["Python engine :8000"]
        WH[Webhooks]
        CTX[Context]
        POL[Policy engine]
        LLM[LLM / heuristic]
        ORCH[Orchestrator]
    end
    subgraph Java["Java store :8080"]
        API[REST API]
        DB[(H2 / Postgres)]
        UI[Agent dashboard]
    end
    Z --> WH --> CTX
    S --> CTX
    CTX --> POL --> ORCH
    CTX --> LLM --> ORCH
    ORCH -->|POST /api/decisions| API --> DB
    API --> UI
    UI -->|approve / override| API
```

**Core principle:**
```
Hard rules (policy) -> Soft reasoning (LLM) -> Human decision -> Audit
```

---

## Pipeline stages

| Stage | Code | Output |
|-------|------|--------|
| Intake | `app/webhooks.py` | `Ticket` |
| Context | `app/context/` | `CustomerContext` |
| Policy | `app/policy/engine.py` | `allowed_actions[]`, flags |
| Reasoning | `app/llm/` | proposed action + reason |
| Orchestrator | `app/orchestrator.py` | clamped `Decision` |
| Audit | `java-service/` | persisted + human actions |

---

## How to run

```powershell
# Terminal 1

**Why customers leave** — connects product analytics + billing to plain-English root causes.

| | |
|---|---|

---

## Features

- **Event ingestion** — mock Mixpanel/Amplitude journey events per customer
- **Friction detection** — identifies where customers stall vs cohort drop-off rates
- **Behavioral signals** — failed payment, support spike, login decline, low adoption
- **Churn risk score** — 0–1 with risk level (low / medium / high / critical)
- **Root cause narratives** — title, explanation, confidence, recommended action
- **Dashboard** — analyze any customer ID live
- **Demo customers** — `cus_at_risk_01`, `cus_healthy_02`, `cus_slipping_03`

---

flowchart LR

    end
    ING --> FR --> SC --> EX
    MP -.-> ING
    ST -.-> ING
    EX --> UI[Dashboard + API]
```

```
analytics events + billing  ->  friction points  ->  churn score  ->  root causes
```

<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
<script>
const DOCS = [
  {id:"run",         file:"RUN.md",                  title:"Getting Started",        note:"Run all 4 products", group:"Start here"},
  {id:"status",      file:"STATUS.md",               title:"Completion Status",      note:"Done vs planned", group:"Start here"},
  {id:"support-product", file:"SUPPORT.md",          title:"Support Decision Engine",note:"Features + architecture", group:"Products"},
  {id:"churn-product",   file:"CHURN.md",            title:"Churn Causality Engine", note:"Features + architecture", group:"Products"},
  {id:"knowledge-product",file:"KNOWLEDGE.md",       title:"Knowledge Search",       note:"Features + architecture", group:"Products"},
  {id:"cost-product",    file:"COST.md",             title:"Cost Drift Detector",    note:"Features + architecture", group:"Products"},
  {id:"portfolio",   file:"PORTFOLIO.md",            title:"Portfolio",              note:"Strategy + pricing", group:"Suite"},
  {id:"playbook",    file:"PLAYBOOK.md",             title:"Founder Playbook",       note:"GTM, pricing, 30-day plan", group:"Suite"},
  {id:"architecture",file:"ARCHITECTURE.md",         title:"Architecture",           note:"Diagrams + pipeline", group:"Suite"},
  {id:"outreach",    file:"OUTREACH.md",             title:"Outreach Templates",     note:"Warm / cold / referral", group:"GTM"},
  {id:"demo",        file:"DEMO_SCRIPT.md",          title:"Demo Script",            note:"Word-for-word 15 min", group:"GTM"},
  {id:"security",    file:"SECURITY.md",             title:"Security One-Pager",     note:"Data flow + compliance", group:"GTM"},
  {id:"pilot",       file:"PILOT_AGREEMENT.md",      title:"Pilot Agreement",        note:"1-page LOI skeleton", group:"GTM"},
  {id:"integration", file:"INTEGRATION_CHECKLIST.md",title:"Integration Checklist",  note:"Zendesk + Stripe", group:"GTM"},
];
const FILE_TO_ID = {};
DOCS.forEach(d => FILE_TO_ID[d.file.toLowerCase()] = d.id);
const DOC_IDS = new Set(DOCS.map(d => d.id));

const hasMarked  = typeof window.marked  !== "undefined";
const hasMermaid = typeof window.mermaid !== "undefined";

if (hasMarked) {
  const renderer = new marked.Renderer();
  renderer.code = function(code, infostring){
    const lang = (infostring || "").trim().split(/\s+/)[0];
    if (lang === "mermaid") return '<div class="mermaid">' + code + '</div>';
    const esc = code.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    return '<pre><code>' + esc + '</code></pre>';
  };
  marked.setOptions({ renderer, gfm:true, headerIds:true, mangle:false });
}
if (hasMermaid) {
  mermaid.initialize({ startOnLoad:false, theme:"dark", securityLevel:"loose",
    themeVariables:{ fontSize:"14px" } });
}

function mdFor(id){
  const el = document.getElementById("md-" + id);
  return el ? el.textContent : "";
}

function buildNav(){
  const nav = document.getElementById("navlinks");
  const groups = [];
  DOCS.forEach(d => {
    if (!groups.includes(d.group)) groups.push(d.group);
  });
  nav.innerHTML = groups.map(g => {
    const items = DOCS.filter(d => d.group === g).map(d =>
      `<a href="#${d.id}" data-id="${d.id}">${d.title}<span class="n">${d.note}</span></a>`
    ).join("");
    return `<div class="nav-group">${g}</div>${items}`;
  }).join("");
}

let mermaidCounter = 0;
async function render(id){
  const doc = DOCS.find(d => d.id === id) || DOCS[0];
  const rendered = document.getElementById("rendered");
  const banner = document.getElementById("banner");
  const md = mdFor(doc.id);

  if (!hasMarked) {
    banner.style.display = "block";
    banner.textContent = "Couldn't load the Markdown renderer (no internet?). Showing raw text below — the content is all here.";
    rendered.innerHTML = '<div class="raw"></div>';
    rendered.querySelector(".raw").textContent = md;
  } else {
    rendered.innerHTML = marked.parse(md);
    if (!hasMermaid) {
      banner.style.display = "block";
      banner.textContent = "Diagrams need the Mermaid library (no internet?). Their source is shown as code blocks.";
    } else {
      const blocks = Array.from(rendered.querySelectorAll(".mermaid"));
      blocks.forEach(b => { b.id = "mmd-" + (mermaidCounter++); });
      try { if (blocks.length) await mermaid.run({ nodes: blocks }); }
      catch(e){ console.error("mermaid render error", e); }
    }
    interceptLinks(rendered);
  }

  document.querySelectorAll("#navlinks a").forEach(a =>
    a.classList.toggle("active", a.dataset.id === doc.id));
  document.title = doc.title + " — Decision Suite";
  window.scrollTo(0,0);
}

// Rewrite links to other .md docs or in-app hash routes.
function interceptLinks(container){
  container.querySelectorAll("a[href]").forEach(a => {
    const href = a.getAttribute("href");
    const m = href.match(/([A-Za-z_]+\.md)(#.*)?$/);
    if (m && FILE_TO_ID[m[1].toLowerCase()]) {
      a.addEventListener("click", e => {
        e.preventDefault();
        location.hash = FILE_TO_ID[m[1].toLowerCase()];
      });
      return;
    }
    const hash = href.match(/^#([a-z0-9-]+)$/);
    if (hash && DOC_IDS.has(hash[1])) {
      a.addEventListener("click", e => {
        e.preventDefault();
        location.hash = hash[1];
      });
    }
  });
}

function current(){
  const id = (location.hash || "").replace("#","");
  return DOCS.some(d => d.id === id) ? id : DOCS[0].id;
}

buildNav();
window.addEventListener("hashchange", () => render(current()));
render(current());
</script>
