spring.application.name=support-decision-audit

# JSON: accept/emit snake_case to match the Python service's payloads.
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false
# Tolerate fields the engine may add to its decision payload in future versions.
spring.jackson.deserialization.fail-on-unknown-properties=false

# In-memory H2 so the MVP runs with zero setup. Swap for Postgres for a pilot:
#   spring.datasource.url=jdbc:postgresql://localhost:5432/sde
spring.datasource.url=jdbc:h2:mem:sde;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2 web console at http://localhost:8080/h2-console (jdbc url above, user sa)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

# API key auth (optional). When set, all /api/* except /api/health and /api/config
# require header: X-API-Key: <value>. Leave blank for local dev without auth.
sde.api-key=${SDE_API_KEY:}

# Seed demo dashboard data (overrides, auto-approved) on empty DB
sde.demo-seed=true

# Disable Spring Security's default generated user (we use X-API-Key instead).
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
